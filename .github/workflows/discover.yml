name: weekly-discovery

# Layer 1 of the curation pipeline: find new/undocumented agent incidents and
# post them as a tracking issue for a human to draft. Zero secrets — uses the
# default GITHUB_TOKEN. Nothing is added to the corpus automatically.

on:
  schedule:
    - cron: "0 9 * * 1" # every Monday 09:00 UTC
  workflow_dispatch: # allow manual runs

permissions:
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Discover candidate incidents
        run: |
          uv run scripts/discover_incidents.py --markdown > candidates.md
          uv run scripts/discover_incidents.py --json candidates.json
          echo "count=$(python3 -c 'import json;print(len(json.load(open("candidates.json"))))')" >> "$GITHUB_OUTPUT"
        id: discover

      - name: Open or update the candidates issue
        if: steps.discover.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('candidates.md', 'utf8')
              + `\n\n---\n_Generated by \`weekly-discovery\` on ${new Date().toISOString().slice(0,10)}. `
              + `Draft a candidate from \`incidents/_TEMPLATE.yaml\` and open a PR; CI enforces the schema, sourcing and neutrality gates._`;
            const title = 'Candidate incidents for review';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'candidates',
            });
            if (existing.data.length) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['candidates'],
              });
            }
