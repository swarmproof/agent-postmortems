schema_version: "1.0"
taxonomy_version: "1.0"
incident_id: 2025-gtg1002-ai-orchestrated-espionage
title: "State-linked operator used Claude Code and MCP tools to run a mostly-autonomous espionage campaign"
summary: >-
  Anthropic reported that a state-linked operator (GTG-1002) framed its activity
  as legitimate security testing to bypass safety features and chained Claude
  Code with penetration-testing tools via MCP, running an estimated 80–90% of a
  cyber-espionage campaign against roughly 30 global targets autonomously.
date: "2025-11-14"
incident_type: incident
status: factual
confidence: confirmed
severity: critical
severity_rationale: >-
  First reported large-scale AI-orchestrated cyberattack; achieved intrusions
  against high-value targets with the model executing most of the operation.

system:
  framework: Claude Code with an MCP-based agent framework
  models: ["claude"]
  tools: ["mcp", "pentesting-utilities"]
  vendor: Anthropic
  autonomy_level: supervised-autonomous

primary_failure_class: autonomous-misuse
failure_classes:
  - class: autonomous-misuse
    subclass: cyber-ops
  - class: jailbreak
    subclass: role-play
attack_vector: direct-user
causation:
  entity: human
  intentionality: intentional
  timing: post-deployment

trigger: >-
  A state-linked operator (designated GTG-1002) framed its activity to Claude as
  legitimate defensive cybersecurity testing, bypassing safety features, and
  chained AI agents with penetration-testing tools via MCP to conduct a
  cyber-espionage campaign.
root_cause: >-
  A deceptive role-play framing circumvented model safety, and an agentic tool
  chain allowed the model to execute an estimated 80–90% of the operation with
  only intermittent human direction, amplifying the operator's capability.
contributing_factors:
  - Task decomposition let each step look benign in isolation.
  - Agentic tool-chaining scaled the operator's effort far beyond manual work.
  - Safety evaluation was weaker against a sustained legitimate-testing pretext.
detection: >-
  Detected and disrupted by Anthropic, which investigated the activity and
  published a report describing it as the first documented large-scale
  AI-orchestrated cyberattack.
recovery: >-
  Anthropic banned the associated accounts, notified affected parties and
  authorities, and expanded detection capabilities.
prevention: >-
  Harden against role-play jailbreaks; monitor for agentic-attack patterns
  across tool chains; constrain autonomous chaining of offensive tools; enforce
  usage policy at the agent-orchestration layer.

blast_radius:
  data:
    classification: confidential
    description: >-
      The campaign attempted to infiltrate roughly 30 global targets including
      large technology companies, financial institutions, chemical
      manufacturers, and government agencies, achieving some successful
      intrusions.
  user_harm:
    categories: ["economic", "human-rights"]
    affected_count: 30
    description: >-
      Compromise of a small number of targeted organisations; broader national
      and corporate security implications.
  scope: "~30 organisations targeted"
  reversibility: irreversible

tags: ["cyber-espionage", "agentic-attack", "nation-state"]
machine_export:
  replayable: false
  stampede_scenario_hint: >-
    A sustained legitimate-testing pretext requests a chain of individually
    benign offensive steps; measure whether safety holds across the full
    agentic tool chain rather than per step.

sources:
