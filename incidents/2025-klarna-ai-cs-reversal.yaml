schema_version: "1.0"
taxonomy_version: "1.0"
incident_id: 2025-klarna-ai-cs-reversal
title: "Klarna reversed its AI-only customer-service strategy and resumed hiring humans"
summary: >-
  After replacing roughly 700 customer-service roles with an AI assistant,
  Klarna found the system overwhelmed by edge cases and sensitive interactions
  and sometimes gave confident but incorrect answers about fees and payment
  terms. The CEO publicly reversed course toward a human/AI hybrid model.
date: "2025-05-08"
incident_type: incident
status: factual
confidence: confirmed
severity: moderate
severity_rationale: >-
  Organization-level quality degradation and incorrect money-related answers (a
  fintech compliance concern), leading to a strategy reversal; no discrete
  catastrophic event.

system:
  framework: Klarna AI customer-service assistant (OpenAI-based)
  models: []
  tools: ["customer-support"]
  vendor: Klarna
  autonomy_level: supervised-autonomous

primary_failure_class: task-failure
failure_classes:
  - class: task-failure
    subclass: quality-degradation
attack_vector: n-a
causation:
  entity: both
  intentionality: unintentional
  timing: post-deployment

trigger: >-
  After replacing roughly 700 customer-service roles with an AI assistant,
  Klarna found that edge cases, emotionally charged interactions, and multi-step
  problem resolution overwhelmed the system, and it sometimes gave confident but
  incorrect answers about fees and payment terms.
root_cause: >-
  Over-optimising for efficiency and cost led to deploying AI beyond its
  reliable envelope, degrading quality on complex or sensitive cases without
  adequate human fallback.
contributing_factors:
  - Coverage was extended to cases outside the model's reliable envelope.
  - Human fallback for complex/sensitive interactions was insufficient.
  - Incorrect money-related answers carried fintech compliance risk.
detection: >-
  Recognised internally via declining customer-satisfaction metrics and publicly
  acknowledged by Klarna's CEO.
recovery: >-
  Klarna reversed course, resumed hiring human agents, and moved to a hybrid
  model where AI handles routine inquiries and humans handle cases needing
  empathy, discretion, or escalation.
prevention: >-
  Scope AI to tasks within its reliable envelope; keep human fallback for
  complex/sensitive cases; monitor quality and compliance metrics; avoid
  cost-only automation decisions.

blast_radius:
  user_harm:
    categories: ["economic"]
    description: >-
      Lower customer-satisfaction scores and incorrect answers about money (a
      compliance concern in fintech) for affected customers, with broader
      business impact on service quality.
  scope: organization-wide customer service
  reversibility: reversible

tags: ["customer-service", "automation-reversal", "quality"]
machine_export:
  replayable: false
  stampede_scenario_hint: >-
    Support agent handles a long-tail mix of emotionally charged, multi-step,
    and money-specific cases with no human fallback; measure quality
    degradation and confidently-wrong financial answers.

