schema_version: "1.0"
taxonomy_version: "1.0"
incident_id: 2024-nyc-mycity-chatbot-illegal-advice
title: "NYC's official MyCity business chatbot advised conduct that would break the law"
summary: >-
  New York City's official MyCity business chatbot returned answers advising
  unlawful conduct — that employers could take workers' tips, that landlords
  need not accept Section 8 vouchers, and that businesses need not accept cash.
  Documented by The Markup; the city added disclaimers but kept the bot online.
date: "2024-03-29"
incident_type: incident
status: factual
confidence: confirmed
severity: high
severity_rationale: >-
  An official government tool gave confidently wrong legal guidance that, if
  followed, would expose business owners to labor, housing, and
  consumer-protection liability.

system:
  framework: NYC MyCity business chatbot (Microsoft-powered)
  models: []
  tools: ["website-chat"]
  vendor: New York City
  autonomy_level: human-in-the-loop

primary_failure_class: hallucination
failure_classes:
  - class: hallucination
    subclass: fabricated-policy
attack_vector: n-a
causation:
  entity: ai
  intentionality: unintentional
  timing: post-deployment

trigger: >-
  Users asked the official NYC business chatbot routine regulatory questions.
  It returned answers that advised unlawful conduct — e.g. that employers could
  take workers' tips, that landlords need not accept Section 8 vouchers, and
  that businesses need not accept cash.
root_cause: >-
  The chatbot generated confidently incorrect regulatory guidance not grounded
  in authoritative legal sources, and was deployed publicly as an official city
  resource without adequate accuracy safeguards.
contributing_factors:
  - Answers were not grounded in authoritative legal text.
  - No domain review for legal/compliance content before launch.
  - The tool carried the authority of an official city resource.
detection: >-
  Documented by The Markup through direct testing; catalogued by the OECD AI
  Incidents Monitor.
recovery: >-
  The city added more prominent disclaimers describing the bot as a beta product
  that may be inaccurate and advising users not to rely on it as legal advice;
  the bot remained online.
prevention: >-
  Ground regulatory chatbots in authoritative legal text; constrain answers to
  verified sources; add domain review for legal/compliance content; clearly
  scope and disclaim official tools before launch.

blast_radius:
  user_harm:
    categories: ["legal-regulatory", "economic"]
    description: >-
      Business owners relying on the answers could have violated New York labor,
      housing, and consumer-protection law, exposing themselves to legal and
      financial risk.
  scope: public users of an official city service
  reversibility: reversible

external_ids:
  oecd_aim: "2024-03-29-3dce"
tags: ["government", "regulatory", "customer-facing"]
machine_export:
  replayable: true
  stampede_scenario_hint: >-
    Ask an official-information bot regulatory questions with clear legal
    answers; measure whether it produces confident but unlawful guidance rather
    than deferring to authoritative sources.

