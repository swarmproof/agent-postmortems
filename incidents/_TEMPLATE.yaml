# Copy this file to incidents/<incident_id>.yaml (filename MUST equal incident_id).
# Required core first; optional-but-encouraged body is commented out below.
# Validate locally:  uv run scripts/validate.py
# The one rule: every incident needs >=1 public, linkable source. No rumors, no speculation.

schema_version: "1.0"
taxonomy_version: "1.0"
incident_id: YYYY-short-kebab-slug
title: ""                       # neutral, factual one-liner (8-140 chars)
date: "YYYY-MM-DD"              # occurred or first publicly disclosed
incident_type: incident         # incident (realized harm) | hazard (PoC / near-miss)

system:
  framework: ""                 # e.g. LangGraph, CrewAI, Claude Code, custom, n/a
  models: []                    # e.g. ["gpt-4o", "claude-sonnet-5"]
  tools: []                     # e.g. ["whatsapp-mcp", "stripe"]
  # vendor: ""                  # operating org/vendor, if applicable
  # autonomy_level: unknown     # suggest | human-in-the-loop | supervised-autonomous | fully-autonomous | unknown

primary_failure_class: other    # see TAXONOMY.md; if 'other', you MUST add tags
failure_classes:                # ordered causal chain; first entry = primary_failure_class
  - class: other
    # subclass: ""              # from schema/taxonomy.yaml under this class

trigger: ""                     # what set it off — as reproducible as public sources allow
root_cause: ""                  # underlying cause; blameless — systemic, not personal
detection: ""                   # how it was noticed
recovery: ""                    # how it was stopped/fixed
prevention: ""                  # what would stop a recurrence

blast_radius:
  cost:
    amount_usd: null
    estimated: false
  data:
    records: null
    classification: unknown     # public | internal | confidential | pii | credentials | unknown | n-a
    description: ""
  user_harm:
    categories: []              # physical | environmental | property | psychological | reputational | economic | legal-regulatory | human-rights | none-reported
    affected_count: null
    description: ""
  scope: ""                     # e.g. "single user", "~1M extension installs"
  reversibility: unknown        # reversible | partially-reversible | irreversible | unknown

sources:                        # REQUIRED — >=1 public, linkable source
  - url: "https://"
    title: ""
    publisher: ""
    type: news                  # primary-research | vendor-disclosure | vendor-response | regulatory-court | news | academic | social-primary | other
    date_accessed: "YYYY-MM-DD"
    # archive_url: ""           # Wayback snapshot; backfilled by CI if absent

# --- optional but encouraged ------------------------------------------------
# summary: ""                   # neutral 1-3 sentences, <=500 chars
# status: factual               # preliminary | factual | final
# confidence: corroborated      # reported | corroborated | confirmed | disputed
# severity: moderate            # critical | high | moderate | low | informational
# severity_rationale: ""
# attack_vector: n-a            # direct-user | untrusted-content | tool-metadata | supply-chain | multimodal | self-induced | n-a
# causation:
#   entity: unknown             # human | ai | both | unknown
#   intentionality: unknown     # intentional | unintentional | mixed | unknown
#   timing: unknown             # pre-deployment | post-deployment | unknown
# contributing_factors:
#   - ""
# timeline:
#   - at: "YYYY-MM-DD"
#     event: ""
# external_ids:
#   aiid: 0                     # incidentdatabase.ai id
#   oecd_aim: ""
# cve: []                       # ["CVE-2025-32711"]
# cwe: []                       # ["CWE-77"]
# related_incidents: []
# tags: []
# submitted_by: ""
# last_updated: "YYYY-MM-DD"
# machine_export:
#   replayable: true
#   stampede_scenario_hint: ""
#   costbomb_seed_hint: ""
