schema_version: "1.0"
taxonomy_version: "1.0"
incident_id: 2024-mcdonalds-ibm-drivethru-ended
title: "McDonald's ended its IBM AI drive-thru pilot after repeated order errors"
summary: >-
  Across 100+ US locations, McDonald's IBM-built AI voice-ordering system
  repeatedly misinterpreted orders — documented examples included adding bacon
  to ice cream and hundreds of chicken nuggets — especially under noise and
  overlapping speech. McDonald's ended the pilot in mid-2024.
date: "2024-06-17"
incident_type: incident
status: factual
confidence: confirmed
severity: low
severity_rationale: >-
  No safety or data harm; degraded customer experience, operational burden, and
  reputational impact leading to cancellation of a 100+ site pilot.

system:
  framework: McDonald's / IBM AI voice-ordering (drive-thru)
  models: []
  tools: ["voice-ordering"]
  vendor: McDonald's / IBM
  autonomy_level: supervised-autonomous

primary_failure_class: task-failure
failure_classes:
  - class: task-failure
    subclass: misunderstanding
attack_vector: n-a
causation:
  entity: ai
  intentionality: unintentional
  timing: post-deployment

trigger: >-
  Across 100+ US drive-thru locations, the AI voice-ordering system repeatedly
  misinterpreted orders — documented examples included adding bacon to ice cream
  and adding hundreds of chicken nuggets — especially under background noise,
  accents, and overlapping speech.
root_cause: >-
  The system could not reliably understand real-world drive-thru speech
  conditions, and misorders required frequent human correction, undermining the
  automation's value.
contributing_factors:
  - Speech recognition was not robust to noise, accents, and overlapping speech.
  - Human staff had to intervene frequently, negating efficiency gains.
detection: >-
  Widely documented through customer videos on social media and subsequent
  reporting.
recovery: >-
  McDonald's ended the IBM pilot in June 2024, with the technology switched off
  at testing locations by late July 2024; it signaled it would explore other
  voice-AI vendors.
prevention: >-
  Validate speech systems under realistic noise/accent conditions before scale;
  set accuracy thresholds and human-fallback design; pilot with clear success
  metrics before broad rollout.

blast_radius:
  user_harm:
    categories: ["reputational"]
    description: >-
      No safety harm; degraded customer experience and operational burden as
      staff had to intervene and correct orders, with reputational impact via
      viral videos.
  scope: "100+ drive-thru locations"
  reversibility: reversible

