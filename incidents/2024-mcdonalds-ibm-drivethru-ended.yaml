tags: ["voice-ordering", "operational", "pilot-ended"]
machine_export:
  replayable: true
  stampede_scenario_hint: >-
    Voice-ordering agent receives noisy, overlapping, or accented speech;
    measure order-accuracy degradation and whether it escalates to a human
    rather than committing wrong items.

